version: '3'

dotenv: ['.env']

vars:
  JARVIS_DB_DSN: '{{.JARVIS_DB_DSN | default ""}}'

tasks:
  help:
    desc: print this help message
    cmds:
      - task --list-all
    silent: true

  confirm:
    desc: confirmation prompt
    cmds:
      - |
        echo -n 'Are you sure? [y/N] ' && read ans && [ ${ans:-N} = y ]
    silent: true
    internal: true

  run:
    desc: run the API server (cmd/go-jarvis)
    cmds:
      - go run ./cmd/go-jarvis

  worker:
    desc: run the dedicated background worker
    cmds:
      - go run ./cmd/worker

  cron:list:
    desc: list available cron jobs
    cmds:
      - go run ./cmd/cron list

  cron:run:
    desc: run a single cron job by name
    vars:
      JOB: '{{.job | default ""}}'
    cmds:
      - |
        if [ -z "{{.JOB}}" ]; then
          echo "Error: job parameter is required"
          echo "Usage: task cron:run job=due-date-reminders"
          exit 1
        fi
      - go run ./cmd/cron {{.JOB}}

  dev:all:
    desc: run the API server and worker together for local development
    cmds:
      - bash ./scripts/dev-all.sh

  migrations:new:
    desc: create a new database migration
    vars:
      NAME: '{{.name | default ""}}'
    cmds:
      - |
        if [ -z "{{.NAME}}" ]; then
          echo "Error: name parameter is required"
          echo "Usage: task migrations:new name=migration_name"
          exit 1
        fi
      - echo 'Creating migration file for {{.NAME}}...'
      - tern new -m ./internal/database/migrations {{.NAME}}

  migrations:up:
    desc: apply all up database migrations
    deps: [confirm]
    cmds:
      - echo 'Running up migrations...'
      - tern migrate -m ./internal/database/migrations --conn-string {{.JARVIS_DB_DSN}}

  tidy:
    desc: format all .go files, and tidy and vendor module dependencies
    cmds:
      - echo 'Formatting .go files...'
      - go fmt ./...
      - echo 'Tidying module dependencies...'
      - go mod tidy
      - echo 'Verifying dependencies...'
      - go mod verify
  
  test:
    desc: run all tests
    cmds:
      - go test -v ./...
